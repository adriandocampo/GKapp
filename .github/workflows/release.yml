name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: gkapp-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gkapp-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            %LOCALAPPDATA%\electron\Cache
            %LOCALAPPDATA%\electron-builder\Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('gkapp-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build Vite
        run: npm run build

      - name: Build and publish Windows
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: gkapp-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: gkapp-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('gkapp-web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build Vite
        run: npm run build

      - name: Build and publish macOS
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
